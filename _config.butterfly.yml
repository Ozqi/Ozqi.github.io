# Butterfly 主题配置

# 导航菜单配置
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  # 友链: /links/ || fas fa-link
  # 搜索: /search/ || fas fa-search
  关于: /about/ || fas fa-heart

# 网站图标和头像
favicon: /img/favicon.svg
avatar:
  img: /img/头像.jpg
  effect: true

# 网站背景
background: /img/backgroud.jpg

# 首页副标题：由 Butterfly 负责打字效果，Hexo 主配置仅保留纯文本 subtitle
subtitle:
  enable: true
  effect: true
  typed_option:
  source: false
  sub:
    - Build Myself from Scratch
    - Systems, Storage, Databases, and Notes
    - 记录技术，也记录成为自己的过程

# 顶部图
index_img: /img/backgroud.jpg
default_top_img: /img/backgroud.jpg
archive_img: /img/backgroud.jpg
tag_img: /img/backgroud.jpg
category_img: /img/backgroud.jpg
index_top_img_height: 72vh

# 主页文章节选
index_post_content:
  method: 3
  length: 600
  excerpt_all: true

# 侧边栏设置
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: 'Systems · Storage · Databases'
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/Ozqi
  card_announcement:
    enable: true
    content: 欢迎来到 DavLiu 的技术花园，记录系统、存储、数据库与成长。
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: false
    orderby: random

# 文章目录设置
toc:
  enable: true
  number: true
  style_simple: false

# 代码块设置
highlight_theme: mac
code_word_wrap: true
highlight_copy: true
highlight_lang: true

# 主题色配置
theme_color:
  enable: true
  main: "#7c3aed"
  paginator: "#06b6d4"
  button_hover: "#f97316"
  text_selection: "#22d3ee"
  link_color: "#2563eb"
  meta_color: "#64748b"
  hr_color: "#a78bfa"
  code_foreground: "#f97316"
  code_background: "rgba(15, 23, 42, .06)"
  toc_color: "#7c3aed"
  blockquote_padding_color: "#7c3aed"
  blockquote_background_color: "rgba(124, 58, 237, .08)"
  scrollbar_color: "#7c3aed"
  meta_theme_color_light: "#f8fafc"
  meta_theme_color_dark: "#0f172a"

# 社交链接
social:
  Github: https://github.com/Ozqi || fab fa-github
  E-Mail: mailto:1021578619@qq.com || fas fa-envelope

# 页脚设置
footer:
  owner:
    enable: true
    since: 2024
  custom_text: 感谢访问！
  copyright: true

# 文章版权声明
post_copyright:
  enable: true
  decode: false
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 评论系统
comments:
  use: false

# 页面加载动画
preloader: true

# 图片预览
fancybox: true

# 网页特效
butterfly_article_double_row: true
activate_power_mode: false
fireworks:
  enable: false
  zIndex: 9999
  mobile: false

# 页面动画效果
pacman:
  enable: false
canvas_ribbon:
  enable: false
  size: 150
  alpha: 0.6
  zIndex: -1
  click_to_change: true
  mobile: false

# 搜索功能（Butterfly 5.5 格式）
search:
  use: local_search
  local_search:
    preload: true
    top_n_per_article: 1
    unescape: false
    pagination:
      enable: true
      hitsPerPage: 8
    CDN:

# 右下角按钮
rightside:
  enable: true
  hide_threshold: 500
  show_percent: true
  total_progress: true

# 阅读模式
readmode: true

# 夜间模式
darkmode:
  enable: true
  button: true
  autoChangeMode: false

# 项目本地样式注入：只加载 source/css/custom.css，不修改主题包源码
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:
