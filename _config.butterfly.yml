# Butterfly 主题配置

# 导航菜单配置
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  友链: /links/ || fas fa-link
  关于: /about/ || fas fa-heart

# 网站图标和头像
favicon: /img/favicon.svg
avatar:
  img: /img/头像.jpg
  effect: true

# 网站背景
background: /img/backgroud.jpg

# 顶部图
index_img: /img/backgroud.jpg
default_top_img: /img/backgroud.jpg
archive_img: /img/backgroud.jpg
tag_img: /img/backgroud.jpg
category_img: /img/backgroud.jpg

# 主页文章节选
index_post_content:
  method: 3
  length: 300
  excerpt_all: true

# 侧边栏设置
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: '欢迎来到我的博客'
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/LiuziqiOvO
  card_announcement:
    enable: true
    content: 欢迎访问本站，这里会分享一些技术文章和生活感悟。
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: false
    orderby: random

# 文章目录设置
toc:
  enable: true
  number: true
  style_simple: false

# 代码块设置
highlight_theme: mac
code_word_wrap: true
highlight_copy: true
highlight_lang: true

# 主题色配置
theme_color:
  enable: true
  main: "#1c1c1c"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#3498db"
  meta_color: "#000000"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#1c1c1c"
  blockquote_padding_color: "#1c1c1c"
  blockquote_background_color: "#1c1c1c"
  scrollbar_color: "#1c1c1c"
  meta_theme_color_light: "#1c1c1c"
  meta_theme_color_dark: "#1c1c1c"

# 社交链接
social:
  Github: https://github.com/LiuziqiOvO || fab fa-github
  E-Mail: mailto:1021578619@qq.com || fas fa-envelope

# 页脚设置
footer:
  owner:
    enable: true
    since: 2024
  custom_text: 感谢访问！
  copyright: true

# 文章版权声明
post_copyright:
  enable: true
  decode: false
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 评论系统
comments:
  use: Waline
  text: true
  count: true
  lazyload: true

# 页面加载动画
preloader: true

# 图片预览
fancybox: true

# 网页特效
butterfly_article_double_row: true
activate_power_mode: false
fireworks:
  enable: false
  zIndex: 9999
  mobile: false

# 页面动画效果
pacman:
  enable: false
canvas_ribbon:
  enable: false
  size: 150
  alpha: 0.6
  zIndex: -1
  click_to_change: true
  mobile: false

# 搜索功能
local_search:
  enable: true
  preload: true
  CDN:

# 右下角按钮
rightside:
  enable: true
  hide_threshold: 500
  show_percent: true
  total_progress: true

# 阅读模式
readmode: true

# 夜间模式
darkmode:
  enable: true
  button: true
  autoChangeMode: false
